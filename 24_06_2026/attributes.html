<!-- what is attribute? -->
<!-- ans: Html attributes provide additional information about an element -->

<!DOCTYPE html>
<html>
<head>
    <title>Document</title>
</head>
<body>
    
    <a href="https://www.google.com/" target="_blank">this is google</a> <!--opens the link in a new tab--> 
    <br>
    <a href="https://www.facebook.com/" target="_self">this is facebook</a> <!--opens the linked document in the same tab   -->
    <br>
    <a href="https://www.instagram.com/" target="_parent">this is instagram</a> <!--opens the linked document in the same tab   -->
    <br>
    <a href="https://www.youtube.com/" target="_top">this is youtube</a> <!--opens the linked document in the same tab   -->
</body>
</html>
